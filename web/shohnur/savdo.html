<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shohnur Market</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#6a00ff;color:#fff;padding:15px;display:flex;align-items:center;gap:15px}
header input{flex:1;padding:8px;border-radius:6px;border:none}
button{cursor:pointer;border:none;border-radius:6px;padding:8px 12px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:20px}
.card{background:#fff;padding:12px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);text-align:center}
.card img{width:100%;height:150px;object-fit:cover}
.price{color:#6a00ff;font-weight:bold;margin:8px 0}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:320px;max-height:90vh;overflow:auto}
.admin-panel{background:#fff;margin:20px;padding:15px;border-radius:10px}
</style>
</head>
<body>

<header>
<h2>🛒 Shohnur Market</h2>
<input type="text" id="search" placeholder="Qidirish...">
<button onclick="openLogin()">Login</button>
<button onclick="openCart()">Savatcha (<span id="cart-count">0</span>)</button>
</header>

<div class="admin-panel">
<h3>Admin: Mahsulot qo‘shish</h3>
<input id="pname" placeholder="Nomi">
<input id="pprice" placeholder="Narxi">
<input id="pimg" placeholder="Rasm URL">
<button onclick="addProduct()">Qo‘shish</button>
</div>

<section class="products" id="products"></section>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-content">
<h3>Savatcha</h3>
<ul id="cart-items"></ul>
<button onclick="closeCart()">Yopish</button>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login</h3>
<input placeholder="Email"><br><br>
<input placeholder="Parol" type="password"><br><br>
<button onclick="closeLogin()">Kirish</button>
</div>
</div>

<script>
let products=[
{id:1,name:"Telefon",price:2500000,img:"https://via.placeholder.com/200"},
{id:2,name:"Naushnik",price:300000,img:"https://via.placeholder.com/200"},
{id:3,name:"Soat",price:450000,img:"https://via.placeholder.com/200"}
];

let cart=[];

function renderProducts(list=products){
const box=document.getElementById("products");
box.innerHTML="";
list.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price.toLocaleString()} so'm</div>
<button onclick="addToCart(${p.id})">Savatchaga</button>
</div>`;
});
}

function addToCart(id){
const p=products.find(x=>x.id===id);
cart.push(p);
document.getElementById("cart-count").innerText=cart.length;
}

function openCart(){
document.getElementById("cartModal").style.display="flex";
const ul=document.getElementById("cart-items");
ul.innerHTML="";
cart.forEach(i=>{
ul.innerHTML+=`<li>${i.name} - ${i.price.toLocaleString()} so'm</li>`;
});
}
function closeCart(){cartModal.style.display="none"}

function openLogin(){loginModal.style.display="flex"}
function closeLogin(){loginModal.style.display="none"}

function addProduct(){
const name=pname.value;
const price=parseInt(pprice.value);
const img=pimg.value;
products.push({id:Date.now(),name,price,img});
renderProducts();
}

search.addEventListener("input",e=>{
const q=e.target.value.toLowerCase();
renderProducts(products.filter(p=>p.name.toLowerCase().includes(q)));
});

renderProducts();
</script>

</body>
</html>
