<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>G'os Akademiyasi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
[data-theme=dark]{--bg:#0d0f14;--s:#161920;--s2:#1e2230;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);--tx:#f0f2f7;--tx2:#9ca3af;--tx3:#6b7280;--ac:#4f8ef7;--acg:rgba(79,142,247,.28)}
[data-theme=light]{--bg:#f0f3fa;--s:#fff;--s2:#e8ecf5;--bd:rgba(0,0,0,.07);--bd2:rgba(0,0,0,.14);--tx:#111827;--tx2:#4b5563;--tx3:#9ca3af;--ac:#2563eb;--acg:rgba(37,99,235,.18)}
:root{--gr:#22c55e;--grb:rgba(34,197,94,.12);--grb2:rgba(34,197,94,.3);--yw:#f59e0b;--ywb:rgba(245,158,11,.12);--ywb2:rgba(245,158,11,.3);--rd:#ef4444;--rdb:rgba(239,68,68,.12);--rdb2:rgba(239,68,68,.3);--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .25s,color .25s}
[data-theme=dark] body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
/* SITE LOCK */
.lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.lock.hide{display:none}
.lbox{background:var(--s);border:1px solid var(--bd2);border-radius:var(--r);padding:30px 26px;width:310px;max-width:90vw;text-align:center;animation:su .4s cubic-bezier(.34,1.56,.64,1)}
.lico{font-size:36px;margin-bottom:10px}
.ltit{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:3px;color:var(--ac)}
.lsub{font-size:11px;color:var(--tx3);margin-bottom:16px}
.lpw{position:relative;margin-bottom:7px}
.linp{width:100%;padding:9px 36px 9px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;letter-spacing:2px;transition:border-color .2s}
.linp:focus{border-color:var(--ac)}
.eye{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--tx3);padding:3px}
.lerr{font-size:11px;color:var(--rd);height:13px;margin-bottom:7px}
/* MAIN */
.app{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 14px 60px;display:none}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 11px;border-bottom:1px solid var(--bd);margin-bottom:14px;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:9px}
.lic{width:34px;height:34px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 14px var(--acg);flex-shrink:0}
.ltx{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.3px;line-height:1.2}
.lsu{font-size:9px;color:var(--tx3)}
.hdr{display:flex;align-items:center;gap:5px}
.ibtn{width:29px;height:29px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--s);color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s}
.ibtn:hover{background:var(--s2)}
/* TABS */
.tabs{display:flex;gap:3px;background:var(--s);padding:3px;border-radius:var(--rs);margin-bottom:14px;border:1px solid var(--bd);overflow-x:auto;width:fit-content;max-width:100%}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--tx3);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--s2);color:var(--tx);border:1px solid var(--bd2)}
/* STATS */
.sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:7px;margin-bottom:12px}
.sc{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;animation:fu .4s ease both}
.sn{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;line-height:1}
.sl{font-size:9px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.sg .sn{color:var(--gr)}.sy .sn{color:var(--yw)}.sr .sn{color:var(--rd)}.sbl .sn{color:var(--ac)}
/* TOOLBAR */
.tb{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.tt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex:1}
.btn{padding:6px 12px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--s);color:var(--tx);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.btn:hover{background:var(--s2);border-color:var(--bd2)}
.bac{background:var(--ac)!important;border-color:var(--ac)!important;color:#fff!important}.bac:hover{opacity:.85!important}
.bgr{background:var(--grb);border-color:var(--grb2);color:var(--gr)}.bgr:hover{background:rgba(34,197,94,.22)}
.brd{background:var(--rdb);border-color:var(--rdb2);color:var(--rd)}.brd:hover{background:rgba(239,68,68,.22)}
/* DAV TABLE */
.dout{overflow-x:auto;overflow-y:auto;max-height:65vh;border:1px solid var(--bd);border-radius:var(--r);background:var(--s)}
.dout::-webkit-scrollbar{width:5px;height:5px}.dout::-webkit-scrollbar-track{background:transparent}.dout::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.dt{border-collapse:collapse;font-size:12px;min-width:100%}
.dt thead{position:sticky;top:0;z-index:10;background:var(--s2)}
.dt th{padding:8px 6px;text-align:left;font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);white-space:nowrap}
.dt th.stk{position:sticky;left:0;background:var(--s2);z-index:11}
.dt td{padding:6px 6px;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);vertical-align:middle;white-space:nowrap}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:rgba(128,128,128,.025)}
.dt td.stk{position:sticky;left:0;background:var(--s);z-index:5}
.dt tr:hover td.stk{background:var(--s2)}
.snm{font-weight:500;font-size:12px;color:var(--tx)}
.sph{font-size:10px;color:var(--tx2)}
.gbg{font-size:10px;padding:2px 6px;border-radius:20px;white-space:nowrap;display:inline-block}
.geng{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2)}
.garb{background:rgba(245,158,11,.1);color:var(--yw);border:1px solid rgba(245,158,11,.2)}
.bch{display:inline-flex;font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;white-space:nowrap}
.bok{background:var(--grb);color:var(--gr);border:1px solid var(--grb2)}
.blow{background:var(--ywb);color:var(--yw);border:1px solid var(--ywb2)}
.bneg{background:var(--rdb);color:var(--rd);border:1px solid var(--rdb2)}
/* STATUS */
.dc{text-align:center;padding:3px 2px}
.sb{width:25px;height:25px;border-radius:50%;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:transform .12s,background .15s}
.sb:hover{transform:scale(1.2)}.sb:active{transform:scale(.85)}
.sb.green{background:var(--grb);border-color:var(--grb2);animation:pop .28s cubic-bezier(.34,1.56,.64,1)}
.sb.yellow{background:var(--ywb);border-color:var(--ywb2);animation:pop .28s cubic-bezier(.34,1.56,.64,1)}
.sb.red{background:var(--rdb);border-color:var(--rdb2);animation:pop .28s cubic-bezier(.34,1.56,.64,1)}
.sb.readonly-btn{cursor:default;pointer-events:none}
.ci{font-size:11px;font-weight:700;display:block;line-height:1;color:var(--tx3)}
.green .ci{color:var(--gr)}.yellow .ci{color:var(--yw)}.red .ci{color:var(--rd)}
.tdc{background:rgba(79,142,247,.06)!important}
.thd{background:rgba(79,142,247,.1)!important;color:var(--ac)!important}
.tdot{display:inline-block;width:5px;height:5px;background:var(--ac);border-radius:50%;margin-left:2px;vertical-align:middle;animation:pulse 2s infinite}
/* SCORE */
.swp{display:flex;align-items:center;gap:4px}
.sbar{flex:1;height:3px;background:rgba(128,128,128,.15);border-radius:2px;overflow:hidden;min-width:26px}
.sbarfill{height:100%;border-radius:2px;transition:width .3s}
.sinp{width:42px;padding:2px 4px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:11px;font-family:'DM Sans',sans-serif;outline:none;text-align:center}
.sinp:focus{border-color:var(--ac)}
.sinp[readonly]{opacity:.6;cursor:default}
/* SCORE READONLY */
.score-ro{display:flex;align-items:center;gap:4px}
.score-ro-bar{flex:1;height:3px;background:rgba(128,128,128,.15);border-radius:2px;overflow:hidden;min-width:26px}
.score-ro-fill{height:100%;border-radius:2px}
.score-ro-num{font-size:11px;font-weight:600;min-width:24px;text-align:right}
/* LEGEND */
.leg{display:flex;gap:12px;margin-top:9px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx3)}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* SEARCH */
.sw{position:relative;margin-bottom:9px}
.si{width:100%;padding:8px 12px 8px 31px;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--ac)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:var(--tx3)}
.scnt{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--tx3)}
/* TABLE */
.tw{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
thead{background:var(--s2)}
th{padding:9px 10px;text-align:left;font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(128,128,128,.025)}
/* FILTER */
.fr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.fb{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx3);font-family:'DM Sans',sans-serif;transition:all .18s}
.fb.act,.fb:hover{background:var(--s2);color:var(--tx);border-color:var(--bd2)}
/* MODALS */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fi .18s ease}
.mbg.hide{display:none}
.modal{background:var(--s);border:1px solid var(--bd2);border-radius:var(--r);padding:20px;width:350px;max-width:92vw;animation:su .28s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.modal h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:13px;color:var(--tx)}
.fg{margin-bottom:9px}
.fl{font-size:9px;color:var(--tx3);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.fi,.fsl{width:100%;padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.fi:focus,.fsl:focus{border-color:rgba(79,142,247,.5)}
.fsl option{background:var(--s)}
.fpw{position:relative}.fi-pw{padding-right:34px!important}
.peye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--tx3);padding:2px}
.mbtns{display:flex;gap:6px;margin-top:13px;justify-content:flex-end}
.qa{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
/* DETAIL */
.dhd{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.dav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;flex-shrink:0}
.dnm{font-size:14px;font-weight:600;color:var(--tx)}
.dph{font-size:11px;color:var(--tx3);margin-top:1px}
.drows{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:11px}
.di{background:var(--s2);border-radius:var(--rs);padding:8px 10px}
.dil{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.div2{font-size:12px;font-weight:600;color:var(--tx)}
/* PAG */
.pag{display:flex;align-items:center;gap:4px;margin-top:9px;flex-wrap:wrap}
.pp{padding:4px 8px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--s);color:var(--tx3);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .15s}
.pp:hover,.pp.act{background:var(--s2);color:var(--tx);border-color:var(--bd2)}
.pp.act{font-weight:600;color:var(--ac)}
/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:12px}
.info-card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:18px;animation:fu .4s ease both}
.info-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;margin-bottom:12px}
.info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12px}
.info-label{color:var(--tx3);min-width:80px;flex-shrink:0}
.info-val{color:var(--tx);font-weight:500}
/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rs);padding:9px 13px;font-size:12px;color:var(--tx);z-index:300;animation:su .28s ease;max-width:270px;line-height:1.5}
.pgs{display:none}.pgs.act{display:block}
/* SECTION LOCK */
.sec-lock{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:12px;color:var(--tx3)}
.sec-lock-box{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:24px;text-align:center;max-width:300px;width:100%}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,142,247,.3)}50%{box-shadow:0 0 0 5px rgba(79,142,247,0)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>
</head>
<body>

<!-- SITE LOCK -->
<div class="lock" id="siteLock">
  <div class="lbox">
    <div class="lico">&#127979;</div>
    <div class="ltit">G'os Akademiyasi</div>
    <div class="lsub">Kirish uchun parolni kiriting</div>
    <div class="lpw">
      <input class="linp" type="password" id="siteInp" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" maxlength="40" />
      <button class="eye" onclick="eyeToggle('siteInp',this)" tabindex="-1">&#128065;</button>
    </div>
    <div class="lerr" id="siteErr"></div>
    <button class="btn bac" style="width:100%;padding:10px;font-size:13px" onclick="trySite()">Kirish &#8594;</button>
  </div>
</div>

<!-- TAB LOCK MODAL -->
<div class="mbg hide" id="mLock">
  <div class="modal">
    <h3 id="mLockT">Kirish</h3>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:12px" id="mLockSub"></div>
    <div class="fg">
      <label class="fl">Parol</label>
      <div class="fpw">
        <input class="fi fi-pw" type="password" id="tlInp" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" maxlength="40" />
        <button class="peye" onclick="eyeToggle('tlInp',this)" tabindex="-1">&#128065;</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--rd);height:13px;margin-bottom:7px" id="mLockErr"></div>
    <div class="mbtns">
      <button class="btn" onclick="closeM('mLock')">Bekor</button>
      <button class="btn bac" onclick="tryTab()">Kirish &#8594;</button>
    </div>
  </div>
</div>

<!-- ADD STUDENT -->
<div class="mbg hide" id="mAdd">
  <div class="modal">
    <h3>Yangi o'quvchi</h3>
    <div class="fg"><label class="fl">Ism Familiya</label><input class="fi" id="inN" /></div>
    <div class="fg"><label class="fl">Telefon</label><input class="fi" id="inP" placeholder="+998 90 123 45 67" /></div>
    <div class="fg"><label class="fl">Guruh</label>
      <select class="fsl" id="inG">
        <option value="english">Ingliz tili</option>
        <option value="arabic">Arab tili</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Boshlang'ich balans (so'm)</label><input class="fi" id="inB" type="number" value="0" /></div>
    <div class="mbtns">
      <button class="btn" onclick="closeM('mAdd')">Bekor</button>
      <button class="btn bac" onclick="addStu()">Saqlash</button>
    </div>
  </div>
</div>

<!-- BALANCE -->
<div class="mbg hide" id="mBal">
  <div class="modal">
    <h3>Balans to'ldirish</h3>
    <div style="font-size:13px;font-weight:500;margin-bottom:3px;color:var(--tx)" id="bNm"></div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:11px" id="bCur"></div>
    <div class="fg"><label class="fl">Miqdor (so'm)</label><input class="fi" id="inAm" type="number" /></div>
    <div class="qa">
      <button class="btn" onclick="setAm(50000)">50 000</button>
      <button class="btn" onclick="setAm(100000)">100 000</button>
      <button class="btn" onclick="setAm(200000)">200 000</button>
      <button class="btn" onclick="setAm(500000)">500 000</button>
    </div>
    <div class="mbtns">
      <button class="btn" onclick="closeM('mBal')">Bekor</button>
      <button class="btn bgr" onclick="addBal()">Qo'shish &#10003;</button>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="mbg hide" id="mDet">
  <div class="modal">
    <div class="dhd">
      <div class="dav" id="dAv"></div>
      <div><div class="dnm" id="dNm"></div><div class="dph" id="dPh"></div></div>
    </div>
    <div class="drows" id="dRows"></div>
    <div class="fg" id="dNmEd" style="display:none"><label class="fl">Ism</label><input class="fi" id="dNmI" /></div>
    <div class="fg" id="dPhEd" style="display:none"><label class="fl">Telefon</label><input class="fi" id="dPhI" /></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      <button class="btn bgr" onclick="balFromDet()">+ Balans</button>
      <button class="btn" onclick="togEdit()">Tahrir</button>
      <button class="btn bac" onclick="saveDet()" id="dSave" style="display:none">Saqlash</button>
      <button class="btn brd" onclick="delDet()">O'chirish</button>
      <button class="btn" onclick="closeM('mDet')">Yopish</button>
    </div>
  </div>
</div>

<!-- PASSWORD MANAGEMENT (ADMIN) -->
<div class="mbg hide" id="mPw">
  <div class="modal">
    <h3>&#128273; Parol boshqaruvi</h3>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:12px">Qaysi parolni o'zgartirmoqchisiz?</div>
    <div class="fg"><label class="fl">Parol turi</label>
      <select class="fsl" id="pwRole">
        <option value="site">Saytga kirish paroli</option>
        <option value="english">Ingliz tili paroli</option>
        <option value="arabic">Arab tili paroli</option>
        <option value="admin">Admin paroli</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Yangi parol</label>
      <div class="fpw"><input class="fi fi-pw" type="password" id="pwNew" /><button class="peye" onclick="eyeToggle('pwNew',this)" tabindex="-1">&#128065;</button></div>

/* STATS */
function calcSts(flt){
  var dd = getDays().map(fmt);
  var g=0,y=0,r=0,tot=0;
  for(var i=0;i<flt.length;i++){
    var att = D.att[flt[i].id] || {};
    for(var j=0;j<dd.length;j++){
      var st = att[dd[j]];
      if(st){ tot++; if(st==='green')g++; else if(st==='yellow')y++; else r++; }
    }
  }
  var pct = tot>0 ? Math.round(g/tot*100) : 0;
  return {count:flt.length, g:g, y:y, r:r, pct:pct};
}

/* BUILD DAV TABLE */
function buildDavTable(flt, outId, canEdit, showBal, showPh){
  var dd = getDays();
  var h = '<table class="dt"><thead><tr>'+
    '<th class="stk" style="min-width:'+(showPh?155:115)+'px">Ism</th>';
  if(showBal) h += '<th style="min-width:70px">Balans</th>';
  h += '<th style="min-width:48px">Baho</th>';
  for(var i=0;i<dd.length;i++){
    var d=dd[i], tod=isToday(d);
    h += '<th class="'+(tod?'thd':'')+'" style="min-width:26px;text-align:center">'+
      d.getDate()+'<span style="display:block;font-size:7px;font-weight:400">'+WK[d.getDay()]+'</span>'+
      (tod?'<span class="tdot"></span>':'')+
      '</th>';
  }
  h += '</tr></thead><tbody>';
  for(var si=0;si<flt.length;si++){
    var s=flt[si];
    var bal=s.balance||0, bc=bal>100000?'bok':bal>0?'blow':'bneg';
    var sc=s.score||0, scC=sc>=80?'var(--gr)':sc>=50?'var(--yw)':'var(--rd)';
    h += '<tr><td class="stk"><div class="snm">'+s.name+'</div>';
    if(showPh) h += '<div class="sph">'+(s.phone||'')+'</div>';
    h += '</td>';
    if(showBal) h += '<td><span class="bch '+bc+'">'+bal.toLocaleString()+'</span></td>';
    /* Score cell */
    if(canEdit){
      h += '<td><div class="swp">'+
        '<input class="sinp" type="number" min="0" max="100" value="'+sc+'" '+
        'onchange="setSc('+s.id+',this.value,\''+outId+'\')" onclick="this.select()" style="color:'+scC+'">'+
        '<div class="sbar"><div class="sbarfill" style="width:'+sc+'%;background:'+scC+'"></div></div>'+
        '</div></td>';
    } else {
      h += '<td><div class="score-ro">'+
        '<span class="score-ro-num" style="color:'+scC+'">'+sc+'</span>'+
        '<div class="score-ro-bar"><div class="score-ro-fill" style="width:'+sc+'%;background:'+scC+'"></div></div>'+
        '</div></td>';
    }
    /* Day cells */
    for(var di=0;di<dd.length;di++){
      var dk=fmt(dd[di]);
      var att = D.att[s.id] || {};
      var st = att[dk] || null;
      var stClass = st || '';
      var icon = st ? IC[st] : '';
      var tod=isToday(dd[di]);
      if(canEdit){
        h += '<td class="dc'+(tod?' tdc':'')+'">'+
          '<button class="sb '+stClass+'" onclick="tog('+s.id+',\''+dk+'\',\''+outId+'\')">'+
          '<span class="ci">'+icon+'</span></button></td>';
      } else {
        h += '<td class="dc'+(tod?' tdc':'')+'">'+
          '<button class="sb '+stClass+' readonly-btn">'+
          '<span class="ci">'+icon+'</span></button></td>';
      }
    }
    h += '</tr>';
  }
  h += '</tbody></table>';
  var out = document.getElementById(outId);
  if(!out) return;
  out.innerHTML = h;
  out.scrollLeft = out.scrollWidth;
}

/* DAVOMAT TAB (readonly, filterable) */
function renderAllDav(){

/* TOGGLE ATTENDANCE */
function tog(id, day, outId){
  if(!D.att[id]) D.att[id] = {};
  var cur = (D.att[id] && D.att[id][day]) || null;
  var idx = ST.indexOf(cur); if(idx<0) idx=0;
  var nxt = ST[(idx+1) % ST.length];
  var s = getStu(id);
  if(s){
    if(nxt==='green') s.balance = (s.balance||0) - DAY_FEE;
    else if(cur==='green') s.balance = (s.balance||0) + DAY_FEE;
  }
  D.att[id][day] = nxt;
  saveD();
  /* refresh current tab */
  if(outId==='dout-eng') renderGrpDav('english');
  else if(outId==='dout-arb') renderGrpDav('arabic');
  /* also refresh readonly davomat if visible */
  if(document.getElementById('tab-davomat').classList.contains('act')) renderAllDav();
  if(document.getElementById('tab-admin').classList.contains('act')) renderAdm();
}

/* SET SCORE */
function setSc(id, v, outId){
  var s = getStu(id); if(!s) return;
  s.score = Math.max(0, Math.min(100, parseInt(v)||0));
  saveD();
  /* refresh all views */
  if(document.getElementById('tab-davomat').classList.contains('act')) renderAllDav();
  if(document.getElementById('tab-admin').classList.contains('act')) renderAdm();
}

    border: 'rgba(37,99,235,.25)'
  };
  if(!c.group || !c.gname) return alert("Majburiy maydonlarni to'ldiring!");
  
  try {
    var res = await fetch('http://localhost:3000/api/courses', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(c)
    });
    if(res.ok) {
      if(!D.courses) D.courses = [];
      D.courses.push(c);
      closeM('mAddCourse');
      alert("Yangi kurs muvaffaqiyatli qo'shildi!");
      location.reload();
    }
  } catch(e){
    console.error('Add Course Error:', e);
  }
}
</script>
